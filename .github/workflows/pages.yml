name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ZED_REV: 8c753ddba7289c06cc634393a6b744e81e4b73a6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kavis UI
        uses: actions/checkout@v4
        with:
          path: kavis-ui

      - name: Checkout Zed GPUI
        uses: actions/checkout@v4
        with:
          repository: zed-industries/zed
          ref: ${{ env.ZED_REV }}
          path: zed

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build web distribution
        working-directory: kavis-ui
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./script/build-web-dist.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kavis-ui/docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
